name: Deploy corerouter to VM

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4

      - name: Execute Remote Deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: ${{ secrets.JWT_EXPIRATION }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          SECURITY_APIKEY_PEPPER: ${{ secrets.SECURITY_APIKEY_PEPPER }}
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
          INSTRUMENTATION_KEY: ${{ secrets.INSTRUMENTATION_KEY }}
          AZURE_APPINSIGHTS_APP_ID: ${{ secrets.AZURE_APPINSIGHTS_APP_ID }}
          AZURE_APPINSIGHTS_API_KEY: ${{ secrets.AZURE_APPINSIGHTS_API_KEY }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: SERVER_PORT,DB_HOST,DB_PORT,DB_NAME,DB_USERNAME,DB_PASSWORD,JWT_SECRET,JWT_EXPIRATION,REDIS_HOST,REDIS_PORT,REDIS_PASSWORD,ENCRYPTION_KEY,SECURITY_APIKEY_PEPPER,APPLICATIONINSIGHTS_CONNECTION_STRING,INSTRUMENTATION_KEY,AZURE_APPINSIGHTS_APP_ID,AZURE_APPINSIGHTS_API_KEY
          script: |
            set -e
            set -o pipefail

            DOCKER_IMAGE="corerouter:latest"

            APP_DIR="/home/fleebug/corerouter"
            LOG_DIR="$APP_DIR/logs"
            LOG_FILE="$LOG_DIR/deploy.log"

            echo "Starting deployment process"


            # Clone if directory doesn't exist, otherwise pull
            if [ ! -d "$APP_DIR" ]; then
              git clone https://github.com/dashivam06/corerouter.git $APP_DIR
            fi

            cd $APP_DIR

            mkdir -p $LOG_DIR

            {
              echo "Pulling latest source code"
              git fetch origin
              git reset --hard origin/main

              echo "Stopping existing container if running"
              sudo docker stop corerouter || true
              sudo docker rm corerouter || true

              echo "Removing old unused images"
              sudo docker image prune -f

              echo "Building new Docker image"
              sudo docker build -t corerouter:latest .

              echo "Starting new container"
              sudo docker run -d \
                --name corerouter \
                -p 7777:7777 \
                -v $LOG_DIR:/app/logs \
                -e SERVER_PORT=$SERVER_PORT \
                -e DB_HOST=$DB_HOST \
                -e DB_PORT=$DB_PORT \
                -e DB_NAME=$DB_NAME \
                -e DB_USERNAME=$DB_USERNAME \
                -e DB_PASSWORD=$DB_PASSWORD \
                -e JWT_SECRET=$JWT_SECRET \
                -e JWT_EXPIRATION=$JWT_EXPIRATION \
                -e REDIS_HOST=$REDIS_HOST \
                -e REDIS_PORT=$REDIS_PORT \
                -e REDIS_PASSWORD=$REDIS_PASSWORD \
                -e ENCRYPTION_KEY=$ENCRYPTION_KEY \
                -e SECURITY_APIKEY_PEPPER=$SECURITY_APIKEY_PEPPER \
                -e APPLICATIONINSIGHTS_CONNECTION_STRING=$APPLICATIONINSIGHTS_CONNECTION_STRING \
                -e INSTRUMENTATION_KEY=$INSTRUMENTATION_KEY \
                -e AZURE_APPINSIGHTS_APP_ID=$AZURE_APPINSIGHTS_APP_ID \
                -e AZURE_APPINSIGHTS_API_KEY=$AZURE_APPINSIGHTS_API_KEY \
                "$DOCKER_IMAGE"

              echo "Deployment completed successfully"

            } 2>&1 | tee -a $LOG_FILE

            echo "Showing last 50 deployment log lines"
            tail -n 50 $LOG_FILE