<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSewa Top-Up Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #4CAF50; color: white; border: none; padding: 10px 15px; cursor: pointer; width: 100%; }
        button:hover { background: #45a049; }
        #log { background: #f0f0f0; padding: 10px; margin-top: 20px; border-radius: 4px; border: 1px solid #ccc; display: none; }
        .error { color: red; }
    </style>
</head>
<body>

    <h2>Wallet Top-Up (eSewa Test)</h2>
    
    <div class="form-group">
        <label for="jwtToken">JWT Token (Bearer):</label>
        <input type="text" id="jwtToken" placeholder="Paste your Login JWT here...">
    </div>

    <div class="form-group">
        <label for="amount">Amount (NPR):</label>
        <input type="number" id="amount" value="100">
    </div>

    <button onclick="initiatePayment()">Pay via eSewa</button>

    <div id="log"></div>

    <!-- Hidden Form for eSewa Redirection -->
    <form id="esewaForm" method="POST" target="_blank">
        <input type="hidden" name="amount" id="p_amount">
        <input type="hidden" name="tax_amount" id="p_tax_amount">
        <input type="hidden" name="total_amount" id="p_total_amount">
        <input type="hidden" name="transaction_uuid" id="p_transaction_uuid">
        <input type="hidden" name="product_code" id="p_product_code">
        <input type="hidden" name="product_service_charge" id="p_product_service_charge">
        <input type="hidden" name="product_delivery_charge" id="p_product_delivery_charge">
        <input type="hidden" name="success_url" id="p_success_url">
        <input type="hidden" name="failure_url" id="p_failure_url">
        <input type="hidden" name="signed_field_names" id="p_signed_field_names">
        <input type="hidden" name="signature" id="p_signature">
    </form>

    <script>
        async function initiatePayment() {
            const token = document.getElementById('jwtToken').value;
            const amount = document.getElementById('amount').value;
            const logDiv = document.getElementById('log');
            
            if (!token) {
                alert("Please enter a JWT Token first (Login via API to get one)");
                return;
            }

            logDiv.style.display = 'block';
            logDiv.innerHTML = "Initiating payment...";

            try {
                const response = await fetch('/api/wallet/topup/initiate', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ amount: parseFloat(amount) })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    logDiv.innerHTML = "Success! Redirecting to eSewa...";
                    const data = result.data;
                    
                    // Fill the hidden form
                    document.getElementById('esewaForm').action = data.payment_url;
                    document.getElementById('p_amount').value = data.amount;
                    document.getElementById('p_tax_amount').value = data.tax_amount;
                    document.getElementById('p_total_amount').value = data.total_amount;
                    document.getElementById('p_transaction_uuid').value = data.transaction_uuid;
                    document.getElementById('p_product_code').value = data.product_code;
                    document.getElementById('p_product_service_charge').value = data.product_service_charge;
                    document.getElementById('p_product_delivery_charge').value = data.product_delivery_charge;
                    document.getElementById('p_success_url').value = data.success_url;
                    document.getElementById('p_failure_url').value = data.failure_url;
                    document.getElementById('p_signed_field_names').value = data.signed_field_names;
                    document.getElementById('p_signature').value = data.signature;

                    // Submit form
                    document.getElementById('esewaForm').submit();
                } else {
                    logDiv.innerHTML = `<span class="error">Error: ${result.message}</span>`;
                }

            } catch (error) {
                logDiv.innerHTML = `<span class="error">Request Failed: ${error.message}</span>`;
            }
        }
    </script>
</body>
</html>
