# Application Settings
spring.application.name=corerouter
server.port=${SERVER_PORT:8080} 

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
logging.level.com.zaxxer.hikari.pool.HikariPool=ERROR
logging.level.com.zaxxer.hikari.HikariConfig=ERROR


# Optional external config
spring.config.import=optional:file:.env[.properties]

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=60000ms
spring.data.redis.jedis.pool.max-active=8
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=0
spring.data.redis.repositories.enabled=false

# OTP Configuration
otp.length=6
otp.ttl.minutes=5
otp.max.attempts=5
otp.resend.cooldown.seconds=60
otp.max.resends.per.hour=5
otp.max.requests.per.email.per.hour=5

# Encryption Configuration
encryption.key=${ENCRYPTION_KEY}


# API Key Configuration
security.apikey.pepper=${SECURITY_APIKEY_PEPPER}

# Error Handling
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always


# eSewa Configuration
esewa.merchant.id=EPAYTEST
esewa.secret.key=8gBm/:&EnhH.1/q
esewa.payment.url=https://rc-epay.esewa.com.np/api/epay/main/v2/form
esewa.verify.url=https://rc-epay.esewa.com.np/api/epay/transaction/status
esewa.success.url=http://localhost:7777/api/wallet/topup/success
esewa.failure.url=http://localhost:7777/api/wallet/topup/failure




applicationinsights.connection.string=${APPLICATIONINSIGHTS_CONNECTION_STRING}

azure.application-insights.instrumentation-key=${INSTRUMENTATION_KEY}


vllm.host=${VLLM_HOST:http://localhost:8000}
azure.appinsights.app.id=${AZURE_APPINSIGHTS_APP_ID}

# Azure Entra ID Configuration (OAuth2 Client Credentials Flow)
# These values are required to authenticate with Azure Application Insights API
azure.entra.tenant-id=${AZURE_ENTRA_TENANT_ID}
azure.entra.client-id=${AZURE_ENTRA_CLIENT_ID}
azure.entra.client-secret=${AZURE_ENTRA_CLIENT_SECRET}

# OAuth Client Configuration (keep secrets only in environment variables)
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:${GUTHIB_CLIENT_ID:}}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:${GUTHIB_CLIENT_SECRET:}}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
auth.oauth.google.token-url=${GOOGLE_TOKEN_URL:https://oauth2.googleapis.com/token}
auth.oauth.google.redirect-uri=${GOOGLE_REDIRECT_URI:https://api.corerouter.me/auth/callback}


# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080,https://corerouter.me,https://www.corerouter.me,https://api.corerouter.me}