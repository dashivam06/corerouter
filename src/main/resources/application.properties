# Application Settings
spring.application.name=corerouter
server.port=${SERVER_PORT:8080} 

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF

# Logging Configuration
logging.file.name=logs/corerouter.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [${spring.application.name:corerouter},%X{requestId:-},%X{userId:-},%X{worker:-}] --- [%15.15t] %-40.40c{1} : %m%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [${spring.application.name:corerouter},%X{requestId:-},%X{userId:-},%X{worker:-}] --- [%15.15t] %-40.40c{1} : %m%n
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.com.fleebug=DEBUG

# Optional external config
spring.config.import=optional:file:.env[.properties]

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=60000ms
spring.data.redis.jedis.pool.max-active=8
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=0
spring.data.redis.repositories.enabled=false

# OTP Configuration
otp.length=6
otp.ttl.minutes=5
otp.max.attempts=5
otp.resend.cooldown.seconds=60
otp.max.resends.per.hour=5
otp.max.requests.per.email.per.hour=5

# Encryption Configuration
encryption.key=${ENCRYPTION_KEY}


# API Key Configuration
security.apikey.pepper=${SECURITY_APIKEY_PEPPER}

# Error Handling
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always


# eSewa Configuration
esewa.merchant.id=EPAYTEST
esewa.secret.key=8gBm/:&EnhH.1/q
esewa.payment.url=https://rc-epay.esewa.com.np/api/epay/main/v2/form
esewa.verify.url=https://rc-epay.esewa.com.np/api/epay/transaction/status
esewa.success.url=http://localhost:7777/api/wallet/topup/success
esewa.failure.url=http://localhost:7777/api/wallet/topup/failure


applicationinsights.connection.string=${APPLICATIONINSIGHTS_CONNECTION_STRING}

azure.application-insights.instrumentation-key=${INSTRUMENTATION_KEY}
